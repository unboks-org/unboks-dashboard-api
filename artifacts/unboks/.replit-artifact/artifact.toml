kind = "web"
previewPath = "/"
title = "Unboks Inbox"
version = "1.0.0"
id = "artifacts/unboks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25767

[services.development]
run = "pnpm --filter @workspace/unboks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/unboks", "run", "build" ]
publicDir = "artifacts/unboks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25767"
BASE_PATH = "/"
