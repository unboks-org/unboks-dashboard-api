<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- J3-N2-14: discourage intermediate caches from holding onto stale
         index.html. The browser still owns the final say (HTTP response
         headers from the static handler win when present), but proxies
         and older CDNs honour these and they're free. The real fix is
         the deploy emitting Cache-Control: no-cache for HTML and a real
         404 for missing /assets/* paths — see the safety net below for
         the client-side mitigation while that's outstanding. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Unboks Inbox</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // ===================================================================
      // Stale-bundle safety net (J3-N2-09 / J3-N2-10 / J3-N2-14).
      //
      // Purpose: Recover automatically when Replit's static asset server
      // returns index.html (200, text/html) for a missing Vite content-hashed
      // /assets/*.js or *.css file after a fresh deploy.
      //
      // This version adds:
      //   - Clear console logging with [Unboks] prefix for operators
      //   - Slightly more generous silent-failure timeout (2200ms)
      //   - Better handling when the URL already contains _cb
      //   - More defensive checks
      // ===================================================================
      (function () {
        var MARKER = "__unboks_stale_bundle_reload";
        var triggered = false;
        var LOG_PREFIX = "[Unboks StaleBundle]";

        function log(msg) {
          try { console.warn(LOG_PREFIX, msg); } catch (_) {}
        }

        function alreadyAttempted() {
          try {
            return sessionStorage.getItem(MARKER) === "1";
          } catch (_) {
            return false;
          }
        }

        function markAttempted() {
          try {
            sessionStorage.setItem(MARKER, "1");
          } catch (_) {}
        }

        function reload(reason) {
          if (triggered) return;
          triggered = true;

          if (alreadyAttempted()) {
            log("Reload already attempted in this tab (" + reason + ") - giving up");
            return;
          }

          markAttempted();
          log("Triggering one-shot cache-bust reload (" + reason + ")");

          try {
            var url = new URL(window.location.href);
            // If we already have a _cb, replace it instead of stacking
            url.searchParams.set("_cb", Date.now().toString());
            window.location.replace(url.toString());
          } catch (_) {
            window.location.reload();
          }
        }

        // 1. Asset load failure (script or stylesheet from /assets/)
        window.addEventListener(
          "error",
          function (e) {
            var t = e && e.target;
            if (!t) return;
            var tag = t.tagName;
            if (tag !== "SCRIPT" && tag !== "LINK") return;
            var url = t.src || t.href || "";
            if (url.indexOf("/assets/") === -1) return;
            log("Asset load error detected: " + url);
            reload("asset-error");
          },
          true
        );

        // 2 + 3. Uncaught errors or promise rejections while the app is still bootstrapping
        function bootstrapStillBroken() {
          var r = document.getElementById("root");
          return !r || r.children.length === 0;
        }

        window.addEventListener("error", function (e) {
          if (bootstrapStillBroken()) {
            log("Uncaught error during bootstrap");
            reload("uncaught-error");
          }
        });

        window.addEventListener("unhandledrejection", function () {
          if (bootstrapStillBroken()) {
            log("Unhandled promise rejection during bootstrap");
            reload("promise-rejection");
          }
        });

        // 4. Silent failure (most common on iOS Safari "Load Failed")
        // Give the bundle a little more time than before.
        setTimeout(function () {
          if (bootstrapStillBroken()) {
            log("Bootstrap timeout - root still empty");
            reload("silent-timeout");
          }
        }, 2200);

        // Helpful marker so operators can see in console that the safety net is active
        try {
          console.info("[Unboks] Stale-bundle safety net active (v2)");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
