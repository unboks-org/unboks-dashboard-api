<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <!-- J3-N2-14: discourage intermediate caches from holding onto stale
         index.html. The browser still owns the final say (HTTP response
         headers from the static handler win when present), but proxies
         and older CDNs honour these and they're free. The real fix is
         the deploy emitting Cache-Control: no-cache for HTML and a real
         404 for missing /assets/* paths — see the safety net below for
         the client-side mitigation while that's outstanding. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Unboks Inbox</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260607-u" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // ===================================================================
      // Stale-bundle safety net (J3-N2-09 / J3-N2-10).
      //
      // Some static SPA deployments serve index.html for ANY 404'd asset path
      // instead of returning a real 404 (previously verified by
      // direct curl against /assets/<old-hash>.js -> 200 OK, content-type
      // text/html, ~730 bytes of HTML body). Every Vite build emits a
      // content-hashed bundle filename; each deploy invalidates the
      // previous filename on disk. Browsers that cached the OLD index.html
      // keep requesting /assets/<old-hash>.js, get HTML back, try to parse
      // HTML as JavaScript, and crash with SyntaxError "Unexpected token <"
      // before any of our code runs. iOS Safari surfaces the result as
      // "Load failed" in a system overlay. Chrome / Firefox show a blank
      // page.
      //
      // This safety net catches FOUR failure modes:
      //   1. A /assets/ script <script> tag fires an "error" event
      //      (network / parse failure of a bundle URL).
      //   2. A window-level uncaught error during initial bundle execution
      //      (e.g. a module-load throw before React mounts).
      //   3. An unhandled promise rejection during bundle bootstrap.
      //   4. The bundle silently never executes (#root stays empty after
      //      5 seconds) — covers iOS Safari's "Load failed" overlay where
      //      no JS error fires because the script load itself was blocked
      //      at the TLS / network layer.
      //
      // In every case we force a ONE-shot cache-bust reload (location with
      // a fresh ?_cb=<timestamp>). A sessionStorage marker tracks that an
      // auto-reload has been attempted in this tab; main.tsx clears the
      // marker as the FIRST thing it does, so a successful bundle execute
      // wipes the marker and the next stale-bundle event can recover the
      // same way. If the reload itself fails (genuine bundle bug, not
      // stale-cache), the marker survives and we surface the broken state
      // instead of looping forever.
      // ===================================================================
      (function () {
        var MARKER = "__unboks_stale_bundle_reload";
        var triggered = false;

        function alreadyAttempted() {
          try {
            return sessionStorage.getItem(MARKER) === "1";
          } catch (_) {
            return false;
          }
        }

        function markAttempted() {
          try {
            sessionStorage.setItem(MARKER, "1");
          } catch (_) {
            // sessionStorage unavailable -> we still reload once because
            // `triggered` (in-memory) protects this tab from a same-tab
            // infinite loop. A new tab will retry from scratch.
          }
        }

        function reload() {
          if (triggered) return;
          triggered = true;
          if (alreadyAttempted()) return;
          markAttempted();
          try {
            var url = new URL(window.location.href);
            url.searchParams.set("_cb", Date.now().toString());
            window.location.replace(url.toString());
          } catch (_) {
            window.location.reload();
          }
        }

        // 1. Asset load failure (the canonical stale-bundle path).
        // Covers both <script src=/assets/...> and <link rel=stylesheet
        // href=/assets/...> — a 404'd CSS falling back to HTML breaks
        // styling without firing a script error, and the symptom is the
        // same broken-app screen.
        window.addEventListener(
          "error",
          function (e) {
            var t = e && e.target;
            if (!t) return;
            var tag = t.tagName;
            if (tag !== "SCRIPT" && tag !== "LINK") return;
            var url = t.src || t.href || "";
            if (url.indexOf("/assets/") === -1) return;
            reload();
          },
          true
        );

        // 2 + 3. Uncaught errors / promise rejections during bundle
        // bootstrap. Only triggers if #root is still empty (i.e. React
        // never mounted) — once the app is running, app-level error
        // boundaries handle their own failures.
        function bootstrapStillBroken() {
          var r = document.getElementById("root");
          return !r || r.children.length === 0;
        }
        window.addEventListener("error", function () {
          if (bootstrapStillBroken()) reload();
        });
        window.addEventListener("unhandledrejection", function () {
          if (bootstrapStillBroken()) reload();
        });

        // 4. Silent failure: nothing threw, but the bundle never ran
        // (e.g. iOS Safari's TLS-level "Load failed" where the request
        // never reaches the JS parser). 1.5s is tight enough to beat
        // the iOS system "Load failed" overlay (which fires after a
        // couple of seconds of script-load stall) while still giving a
        // real bundle on a slow 3G phone room to mount #root.
        setTimeout(function () {
          if (bootstrapStillBroken()) reload();
        }, 1500);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
